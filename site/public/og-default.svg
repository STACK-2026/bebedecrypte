  </text>

  <g transform="translate(80 440)">
    <rect width="120" height="56" rx="14" fill="#0891b2"/>
    <text x="60" y="38" font-family="system-ui,sans-serif" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle">A</text>
