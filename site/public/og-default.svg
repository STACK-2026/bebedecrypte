    <path d="M 0 400 L 1200 400" stroke="#fefce8" stroke-width="1"/>
    <path d="M 400 0 L 400 630" stroke="#fefce8" stroke-width="1"/>
    <path d="M 800 0 L 800 630" stroke="#fefce8" stroke-width="1"/>
  </g>

  <g transform="translate(880 120)">
    <path d="M 60 20 q 20 -8 40 0 q 10 8 0 16 l -40 0 q -10 -8 0 -16 z" fill="url(#bottle)"/>
    <rect x="48" y="36" width="64" height="12" rx="4" fill="url(#bottle)"/>
    <rect x="40" y="52" width="80" height="180" rx="14" fill="url(#bottle)"/>
    <g stroke="#0891b2" stroke-linecap="round" stroke-width="3">
      <line x1="56" y1="86" x2="108" y2="86" opacity="0.85"/>
      <line x1="56" y1="110" x2="96" y2="110" opacity="0.6"/>
      <line x1="56" y1="134" x2="104" y2="134" opacity="0.75"/>
      <line x1="56" y1="158" x2="88" y2="158" opacity="0.5"/>
      <line x1="56" y1="182" x2="100" y2="182" opacity="0.7"/>
    </g>
  </g>

  <g transform="translate(1020 280)">
