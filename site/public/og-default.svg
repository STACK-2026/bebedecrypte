    <text x="190" y="38" font-family="system-ui,sans-serif" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle">B</text>
    <rect x="260" width="120" height="56" rx="14" fill="#eab308"/>
    <text x="320" y="38" font-family="system-ui,sans-serif" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle">C</text>
