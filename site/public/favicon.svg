<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true">
  <title>BébéDécrypte</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
    <radialGradient id="lens" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Baby bottle (biberon) , white silhouette with decoded level lines -->
  <g transform="translate(18 10)">
    <!-- nipple -->
    <path d="M12 1 q 4 -2 8 0 q 2 2 0 4 l -10 0 q -2 -2 2 -4 z" fill="#fefce8" opacity="0.95"/>
    <!-- neck ring -->
    <rect x="8" y="5" width="14" height="3.5" rx="1" fill="#fefce8" opacity="0.85"/>
    <!-- body -->
    <rect x="5" y="9" width="20" height="36" rx="4" fill="#fefce8" opacity="0.95"/>
    <!-- level lines (ingredient list metaphor) -->
    <g stroke="#0891b2" stroke-linecap="round" stroke-width="1.5">
      <line x1="8" y1="17" x2="22" y2="17" opacity="0.85"/>
      <line x1="8" y1="23" x2="18" y2="23" opacity="0.6"/>
      <line x1="8" y1="29" x2="21" y2="29" opacity="0.8"/>
      <line x1="8" y1="35" x2="16" y2="35" opacity="0.55"/>
      <line x1="8" y1="41" x2="19" y2="41" opacity="0.75"/>
    </g>
    <!-- heartbeat micro-pulse on the first (most readable) line -->
    <circle cx="25" cy="17" r="1.4" fill="#f59e0b">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Magnifying glass (loupe parentale , signature Decrypte family) -->
  <g>
    <circle cx="44" cy="40" r="11" fill="url(#lens)" stroke="#f59e0b" stroke-width="2.5"/>
    <line x1="52" y1="48" x2="58" y2="54" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate"
      values="-3 -2; 3 2; -1 1; -3 -2" dur="7s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
  </g>
</svg>
