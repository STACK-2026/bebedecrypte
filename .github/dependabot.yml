version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/site'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '06:00'
      timezone: 'Europe/Paris'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'npm'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    groups:
      astro:
        patterns:
          - 'astro'
          - '@astrojs/*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'

  - package-ecosystem: 'pip'
    directory: '/blog-auto'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '06:30'
      timezone: 'Europe/Paris'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'python'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '07:00'
      timezone: 'Europe/Paris'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'chore(ci)'
      include: 'scope'
